<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Misumeh</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    
        <script src="custom-cursor.js"></script>

    <style>

        .page-wrapper {
            width: min(1200px, calc(100% - 8rem));
            margin: 0 auto;
        }

        /* --- HERO --- */
        .hero {
            position: relative;
            min-height: 90vh;
            display: flex;
            align-items: center;
            background-size: cover;
            background-position: center;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--bg) 0%, rgba(11,11,13,0.85) 45%, transparent 100%);
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 10; width: 100%; animation: revealLeft 0.8s ease-out forwards; }
        .hero-content h1 {
            font-size: clamp(4rem, 14vw, 9rem);
            font-weight: 800;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -6px;
            text-transform: uppercase;
        }
        .hero-desc {
            font-size: 1.4rem;
            color: var(--text-dim);
            max-width: 550px;
            margin-top: 2.5rem;
            line-height: 1.5;
            border-left: 3px solid var(--accent);
            padding-left: 2rem;
        }

        /* --- MAIN GRID --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 6rem;
            margin-top: -15vh;
            position: relative;
            z-index: 20;
            padding-bottom: 5rem;
        } 

        .nav-toggle {
            display: none;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            padding: 0.85rem;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }
        .nav-toggle:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        @media (max-width: 1080px) {
            .page-wrapper {
                width: 100%;
                max-width: 100%;
                padding: 0 1.5rem;
            }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .footer-links {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .main-grid {
                grid-template-columns: 1fr;
                margin-top: 2rem;
            }
            .recs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .top-nav.nav-open .nav-actions {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                gap: 0.8rem;
                margin-top: 1rem;
            }
            .top-nav.nav-open .nav-actions a,
            .top-nav.nav-open .nav-actions .icon-link {
                width: 100%;
            }
            .subscription-grid {
                grid-template-columns: repeat(2, minmax(260px, 1fr));
            }
            .page-wrapper {
                padding: 0 2rem;
            }
        }

        @media (max-width: 760px) {
            .page-wrapper {
                width: 100%;
                max-width: 100%;
                padding: 0 1rem;
            }
            .top-nav {
                flex-wrap: wrap;
                align-items: center;
                gap: 0.75rem;
                padding: 1rem;
            }
            .nav-toggle {
                display: inline-flex;
            }
            .nav-actions {
                display: none;
            }
            .top-nav.nav-open .nav-actions {
                display: flex;
            }
            .top-nav .brand {
                width: 100%;
                text-align: left;
            }
            .hero {
                min-height: auto;
                padding-bottom: 1rem;
            }
            .hero-content {
                padding: 3rem 0 2rem;
            }
            .hero-desc {
                max-width: 100%;
                font-size: 1rem;
                border-left: none;
                padding-left: 0;
            }
            .main-grid {
                gap: 2rem;
            }
            .sidebar {
                position: static;
                top: auto;
                width: 100%;
            }
            .dl-slot {
                flex-wrap: wrap;
                gap: 0.8rem;
            }
            .dl-slot .slot-meta {
                width: 100%;
            }
            .premium-action {
                width: 100%;
                padding: 1.4rem;
            }
            .recs-grid {
                grid-template-columns: 1fr;
            }
            .footer-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .footer-links {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<custom-cursor></custom-cursor>

<div id="content"></div>

<script>
    async function init() {
        const container = document.getElementById('content');
        try {
            const res = await fetch('packs.json?v=' + Date.now());
            const packs = await res.json();
            const id = new URLSearchParams(window.location.search).get('id');
            const pack = packs.find(p => String(p.id) === String(id));

            if (!pack) {
                container.innerHTML = "<h1 style='padding:10rem'>Pack Not Found</h1>";
                return;
            }

            document.title = `${pack.name} — Misumeh`;

            // Tags display
            const t = pack.tags || {};
            const keys = ['origin', 'color', 'res'];
            let featureHtml = '';
            keys.forEach(key => {
                if(t[key]) {
                    featureHtml += `<div class="feature-card"><label>${key}</label><p>${t[key]}</p></div>`;
                }
            });

            // Distribution Slots
            let slots = '';
            const l = pack.links;
            const icon = '<i class="fa-solid fa-arrow-up-right-from-square margin-icon"></i>';
            
            if(l.j189) slots += `<a href="${l.j189}" target="_blank" class="dl-slot"><div class="slot-meta"><span><i class="fa-solid fa-laptop margin-icon"></i> JAVA LEGACY (1.8)</span><small>SLOW & AD SUPPORTED</small></div>${icon}</a>`;
            if(l.j121) slots += `<a href="${l.j121}" target="_blank" class="dl-slot patreon-only" style="background: rgba(52, 27, 75, 0.18);border-color: var(--accent);border-radius:12px"> <div class="slot-meta"><span style="color: #dfbcff"><i class="fa-solid fa-computer margin-icon"></i> JAVA MODERN (26.1 / 1.21)</span><small style="color:#a855f7">DIRECT LINK & PATREON ONLY</small></div>${icon}</a>`;
            if(l.bedrock) slots += `<a href="${l.bedrock}" target="_blank" class="dl-slot"><div class="slot-meta"><span><i class="fa-solid fa-mobile-screen margin-icon"></i> BEDROCK EDITION</span><small>SLOW & AD SUPPORTED</small></div>${icon}</a>`;
            if(l.nsfw) slots += `<a href="${l.nsfw}" target="_blank" class="dl-slot patreon-only nsfw" style="background:rgba(248,113,113,0.05);border-color: var(--nsfw-accent);border-radius:12px"><div class="slot-meta"><span style="color: var(--nsfw-accent)"><i class="fa-solid fa-lock margin-icon"></i> NSFW EDITION</span><small style="color:#f97580">DIRECT LINK & PATREON ONLY</small></div>${icon}</a>`;

            // Recommendations Logic (Shuffle and take 4 excluding current)
            const recs = packs.filter(p => String(p.id) !== String(id)).sort(() => 0.5 - Math.random()).slice(0, 4);
            let recsHtml = '';
            recs.forEach(r => {
                recsHtml += `
                    <a href="pack.html?id=${r.id}" class="rec-card">
                        <div class="rec-thumb" style="background-image: url('${r.thumb}')"></div>
                        <div class="rec-info">
                            <span>${r.tags.origin || 'TEXTURE PACK'}</span>
                            <h4>${r.name}</h4>
                        </div>
                    </a>
                `;
            });

            container.innerHTML = `
                <header class="top-nav">
            <a class="brand" href="index.html">MISU<span style="color: var(--accent);">MEH</span></a>
                    <button class="nav-toggle" onclick="toggleMenu()" aria-label="Open menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="nav-actions">
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Catalog</a>
                <a href="#membership" class="btn-outline"><i class="fa-solid fa-user-plus margin-icon"></i>Membership</a>
                <a href="https://discord.gg/BGB66CWGnj" target="_blank" rel="noopener" class="icon-link" aria-label="Discord"><i class="fa-brands fa-discord" aria-hidden="true"></i>
                </a>
                <a href="https://www.patreon.com/cw/MisuPacks" target="_blank" rel="noopener" class="icon-link" aria-label="Patreon">
                    <i class="fa-brands fa-patreon" aria-hidden="true"></i>
                </a>
                    </div>
                </header>

                <header class="hero" style="background-image: url('${pack.thumb}');">
                    <div class="page-wrapper">
                        <div class="hero-content">
                            <h1>${pack.name}</h1>
                            <p class="hero-desc">${pack.desc}</p>
                        </div>
                    </div>
                </header>

                <div class="page-wrapper">
                    <div class="main-grid">
                        <main>
                            <div class="video-box">
                                <iframe src="https://www.youtube-nocookie.com/embed/${pack.yt}?rel=0&modestbranding=1" allowfullscreen></iframe>
                            </div>
                            <div class="feature-row">${featureHtml}</div>
                        </main>

                        <aside class="sidebar">
                            <div class="db-card">
                                <div class="db-header">
                                    <h3><i class="fa-solid fa-download"></i> DOWNLOADS</h3>
                                    <p>Select Your Game Version</p>
                                </div>
                                <div class="dl-list">${slots}</div>
                                <a href="https://www.patreon.com/cw/MisuPacks" target="_blank" class="premium-action">
                                    <h4>Unlock Premium Access</h4>
                                    <p>Join Patreon for instant downloads, no ads, and exclusive NSFW content.</p>
                                </a>
                            </div>
                        </aside>
                    </div>


                    <section class="recs-section">
                        <div class="recs-header">
                            <h2>Checkout more packs</h2>
                            <div class="line"></div>
                        </div>
                        <div class="recs-grid">${recsHtml}</div>
                    </section>

                    <section class="membership" id="membership">
                        <div class="page-wrapper">
                            <div class="membership-intro">
                                <h2>Support Misumeh</h2>
                                <p>Join our Patreon to get access to exclusive texture packs, early access to new releases, and support the development of more high-quality anime-inspired Minecraft textures.</p>
                            </div>
                            <div class="subscription-grid">
                                <div class="sub-card">
                                    <img src="https://c10.patreonusercontent.com/4/patreon-media/p/reward/28297996/06171f6a9e064e5ab29e5ce49b5d330c/eyJ3Ijo0MDB9/1.png?token-hash=R8io04pSQHwL7j0kTe0pqpyaCqEjY5ncE1Jyv23dLS4%3D" class="sub-thumb" alt="Modern Tier">
                                    <div class="sub-body">
                                        <span class="sub-tag">Most Popular</span>
                                        <h3 class="sub-title">Modern</h3>
                                        <div class="sub-price">
                                            <strong>$9.99</strong>
                                            <span>/month</span>
                                        </div>
                                        <p class="sub-desc">Access to all current texture packs with direct download links, no ads, and priority support.</p>
                                        <ul class="sub-features">
                                            <li>Direct download links for all packs</li>
                                            <li>No ads or waiting times</li>
                                            <li>Priority Discord support</li>
                                            <li>Early access to new releases</li>
                                        </ul>
                                        <div class="sub-card-footer">
                                            <a href="https://www.patreon.com/cw/MisuPacks" class="btn-primary" target="_blank"><i class="fa-solid fa-user-plus"></i>Subscribe</a>
                                        </div>
                                    </div>
                                </div>
                                <div class="sub-card">
                                    <img src="https://c10.patreonusercontent.com/4/patreon-media/p/reward/28438405/8f7cea85bf224fa08c828b613712a5c1/eyJ3Ijo0MDB9/1.png?token-hash=My6nuSPAajxocnLM5Mzf_BlKt5x_ZJHa3EQrZnnbhW8%3D" class="sub-thumb" alt="Classics Tier">
                                    <div class="sub-body">
                                        <span class="sub-tag">Best Value</span>
                                        <h3 class="sub-title">Classics</h3>
                                        <div class="sub-price">
                                            <strong>$14.99</strong>
                                            <span>/month</span>
                                        </div>
                                        <p class="sub-desc">Everything in Modern, plus access to our entire archive of classic texture packs.</p>
                                        <ul class="sub-features">
                                            <li>All Modern tier benefits</li>
                                            <li>Access to classic packs archive</li>
                                            <li>Exclusive behind-the-scenes content</li>
                                            <li>Vote on future pack themes</li>
                                        </ul>
                                        <div class="sub-card-footer">
                                            <a href="https://www.patreon.com/cw/MisuPacks" class="btn-primary" target="_blank"><i class="fa-solid fa-user-plus"></i>Subscribe</a>
                                        </div>
                                    </div>
                                </div>
                                <div class="sub-card">
                                    <img src="https://c10.patreonusercontent.com/4/patreon-media/p/reward/28438409/4e5b9d9eb5074de6a5b82d8278f097a2/eyJ3Ijo0MDB9/1.png?token-hash=5LKVqFmiwj7bTdr5mrRE5-CTlI2eUtYD0Iadj9Rezpo%3D" class="sub-thumb" alt="Nightly Tier">
                                    <div class="sub-body">
                                        <span class="sub-tag">Ultimate</span>
                                        <h3 class="sub-title">Nightly</h3>
                                        <div class="sub-price">
                                            <strong>$19.99</strong>
                                            <span>/month</span>
                                        </div>
                                        <p class="sub-desc">Everything in Classics, plus early access to experimental builds and custom requests.</p>
                                        <ul class="sub-features">
                                            <li>All Classics tier benefits</li>
                                            <li>Early access to experimental builds</li>
                                            <li>Custom texture requests</li>
                                            <li>Direct creator communication</li>
                                        </ul>
                                        <div class="sub-card-footer">
                                            <a href="https://www.patreon.com/cw/MisuPacks" class="btn-primary" target="_blank"><i class="fa-solid fa-user-plus"></i>Subscribe</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

    <footer class="footer">
        <div class="page-wrapper">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3><span style="color: #ffffff;">MISU<span style="color: var(--accent);">MEH</h3>
                   <ul>
                    <li><a href="index.html"><i class="fa-brands fa-youtube margin-icon"></i>YouTube Channel</a></li>
                    <li><a href="index.html#membership"><i class="fa-brands fa-instagram margin-icon"></i> Instagram Profile</a></li>
                    <li><a href="https://discord.gg/BGB66CWGnj" target="_blank"><i class="fa-brands fa-twitter margin-icon"></i> Twitter Feed</a></li>
                    <li><a href="https://www.patreon.com/cw/MisuPacks" target="_blank"><i class="fa-brands fa-tiktok margin-icon"></i> TikTok Videos</a></li> 
                    </ul>
                </div>
                <div class="footer-links">
                    <div class="footer-section">
                        <h4>Resources</h4>
                        <ul>
                            <li><a href="index.html"><i class="fa-solid fa-magnifying-glass margin-icon"></i>Browse Packs</a></li>
                            <li><a href="index.html#membership"><i class="fa-solid fa-user-plus margin-icon"></i>Membership</a></li>
                            <li><a href="https://discord.gg/BGB66CWGnj" target="_blank"><i class="fa-brands fa-discord margin-icon"></i>Discord Community</a></li>
                            <li><a href="https://www.patreon.com/cw/MisuPacks" target="_blank"><i class="fa-brands fa-patreon margin-icon"></i>Support on Patreon</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Legal</h4>
                        <ul>
                            <li><a href="terms.html"><i class="fa-solid fa-file-contract margin-icon"></i>Terms of Service</a></li>
                            <li><a href="privacy.html"><i class="fa-solid fa-shield-halved margin-icon"></i>Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Misumeh. All rights reserved.</p>
                <p>Made with <i class="fa-solid fa-heart" style="color: var(--accent);"></i> for the Minecraft community</p>
            </div>
        </div>
    </footer>
            `;
        } catch (e) {
            container.innerHTML = "<h1 style='padding:10rem; text-align:center;'>Critical Error</h1>";
        }
    }

    function toggleMenu() {
        const nav = document.querySelector('.top-nav');
        if (nav) nav.classList.toggle('nav-open');
    }

    init();
</script>
</body>
</html>
